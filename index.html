<!DOCTYPE html>
<html lang="ko">
<head>
  <link rel="manifest" href="./manifest.json">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>핸니의 체육관</title>
  <style>
    :root {
      --bg: #0d0d0d;
      --surface: #161616;
      --surface2: #1e1e1e;
      --accent: #FF8C42;
      --accent-dim: rgba(255,140,66,0.10);
      --text1: #e8e8e8;
      --text2: #888;
      --text3: #444;
      --green: #22C55E;
      --border: #242424;
      --border2: #2e2e2e;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    body {
      background: var(--bg);
      color: var(--text1);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-size: 15px;
      line-height: 1.5;
      min-height: 100vh;
      padding: 16px 16px 48px;
      max-width: 480px;
      margin: 0 auto;
    }

    /* ── Dashboard Header ── */
    .header { background: var(--surface); border-radius: 20px; padding: 20px; margin-bottom: 14px; border: 1.5px solid var(--border); }
    .header-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; }
    .header-left { display: flex; align-items: center; gap: 10px; }
    .logo { font-size: 26px; font-weight: 900; letter-spacing: 0.15em; text-transform: uppercase; color: var(--accent); }
    .date-label { font-size: 12px; color: var(--text2); }
    .header-mid { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
    .header-mid-left { display: flex; align-items: center; gap: 8px; }
    .program-badge { background: var(--accent); color: #000; font-size: 13px; font-weight: 900; padding: 7px 20px; border-radius: 20px; letter-spacing: 1.5px; cursor: pointer; }
    .program-input { background: var(--surface2); border: 1.5px solid var(--accent); border-radius: 20px; color: var(--accent); font-size: 13px; font-weight: 900; padding: 7px 20px; letter-spacing: 1.5px; outline: none; width: 140px; font-family: inherit; text-align: center; }
    .top-btn { background: none; border: 1.5px solid #333; color: #666; font-size: 12px; font-weight: 700; padding: 7px 14px; border-radius: 20px; cursor: pointer; transition: all .2s; font-family: inherit; }
    .top-btn.active { border-color: var(--accent); color: var(--accent); background: #1f1209; }
    .intro-btn { background: var(--accent-dim); border: 1.5px solid rgba(255,140,66,0.3); color: var(--accent); font-size: 14px; font-weight: 700; padding: 11px 14px; border-radius: 20px; cursor: pointer; font-family: inherit; transition: all .2s; width: 100%; }
    .intro-btn.active { background: rgba(255,140,66,0.15); border-color: var(--accent); }
    .progress-bar { display: flex; gap: 5px; margin-bottom: 16px; }
    .progress-dot { flex: 1; height: 3px; background: var(--border); border-radius: 2px; transition: background 0.3s; }
    .progress-dot.done { background: var(--accent); }
    .field-label { font-size: 11px; font-weight: 800; color: var(--accent); letter-spacing: 1px; text-transform: uppercase; margin-bottom: 8px; }
    .condition-input { width: 100%; background: var(--surface2); border: 1.5px solid var(--border2); border-radius: 13px; color: var(--text1); font-size: 14px; padding: 12px 14px; outline: none; resize: none; min-height: 68px; font-family: inherit; line-height: 1.6; }
    .condition-input::placeholder { color: var(--text3); }
    .condition-input:focus { border-color: var(--accent); }

    /* ── Popup ── */
    .popup-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.75); z-index: 200; display: flex; align-items: flex-end; }
    .popup-sheet { width: 100%; max-width: 480px; margin: 0 auto; background: var(--surface); border-radius: 24px 24px 0 0; padding: 24px 20px 40px; border-top: 1.5px solid var(--border); animation: slideUp .25s ease; }
    @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
    .popup-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; }
    .popup-label { font-size: 11px; font-weight: 800; letter-spacing: 0.12em; text-transform: uppercase; color: var(--accent); }
    .popup-close { background: var(--surface2); border: 1.5px solid var(--border2); color: var(--text2); font-size: 12px; font-weight: 700; padding: 6px 14px; border-radius: 20px; cursor: pointer; font-family: inherit; }
    .popup-text { font-size: 16px; color: var(--text1); line-height: 1.9; white-space: pre-wrap; }
    .intro-card-inner { background: rgba(255,140,66,0.05); border: 1.5px solid rgba(255,140,66,0.22); border-radius: 13px; padding: 12px 14px; }
    .intro-card-label { font-size: 10px; font-weight: 800; letter-spacing: 0.12em; text-transform: uppercase; color: var(--accent); margin-bottom: 8px; }
    .intro-card-text { font-size: 15px; color: var(--text1); line-height: 1.9; word-break: keep-all; }
    .ex-card.collapsed { cursor: pointer; }
    .ex-card.collapsed:active { opacity: 0.75; }
    .popup-loading { font-size: 14px; color: var(--text2); text-align: center; padding: 24px 0; }

    /* ── Exercise Card ── */
    .ex-card { background: var(--surface); border-radius: 20px; padding: 18px; margin-bottom: 14px; border: 1.5px solid var(--border); transition: border-color .25s; }
    .ex-card.editing { border-color: rgba(255,140,66,0.3); }
    .ex-card.completed { border-color: rgba(34,197,94,0.35); }
    .ex-card.skipped { opacity: 0.45; }
    .card-top { margin-bottom: 14px; }
    .card-top-row { display: flex; align-items: flex-start; justify-content: space-between; gap: 8px; }
    .card-info { flex: 1; min-width: 0; }
    .ex-num { font-size: 10px; font-weight: 800; color: var(--accent); letter-spacing: 1px; margin-bottom: 4px; }
    .ex-name { font-size: 17px; font-weight: 800; color: #f5f5f5; line-height: 1.2; margin-bottom: 8px; word-break: keep-all; }
    .ex-meta { width: 100%; margin-top: 6px; }
    .meta-tag { background: #222; border: 1px solid #333; border-radius: 8px; padding: 4px 10px; font-size: 12px; font-weight: 700; color: #bbb; }
    .meta-tag span { color: var(--accent); }
    .meta-tag.last { border-color: rgba(34,197,94,0.25); }
    .meta-tag.last span { color: var(--green); }
    .card-btns { display: flex; flex-direction: row; gap: 6px; align-items: center; flex-shrink: 0; }
    .card-btn { background: var(--surface2); border: 1.5px solid var(--border2); color: #888; font-size: 12px; font-weight: 700; padding: 8px 14px; border-radius: 20px; cursor: pointer; transition: all .2s; font-family: inherit; white-space: nowrap; }
    .card-btn.edit-on { border-color: var(--accent); color: var(--accent); }
    .card-btn.skip-on { background: #1f1209; border-color: var(--accent); color: var(--accent); }
    .card-btn.delete { background: #1f0e0e; border-color: #3a1a1a; color: #e05555; }
    .skip-arrow-row { display: flex; gap: 5px; align-items: center; }
    .arrow-btn { background: var(--surface2); border: 1.5px solid #2a2a2a; color: #777; font-size: 13px; width: 34px; height: 34px; border-radius: 12px; cursor: pointer; font-family: inherit; display: flex; align-items: center; justify-content: center; transition: all .2s; flex-shrink: 0; }
    .arrow-btn:active { background: #252525; color: var(--accent); border-color: var(--accent); }
    .edit-fields { background: #111; border-radius: 14px; padding: 14px; margin-bottom: 12px; }
    .edit-row { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }
    .edit-row:last-child { margin-bottom: 0; }
    .edit-label { font-size: 11px; color: #555; min-width: 40px; font-weight: 700; }
    .edit-input { flex: 1; background: #1a1a1a; border: 1.5px solid #2a2a2a; border-radius: 10px; color: #f0f0f0; font-size: 14px; font-weight: 700; padding: 9px 12px; outline: none; font-family: inherit; }
    .edit-input:focus { border-color: var(--accent); }
    .edit-unit { font-size: 12px; color: #555; min-width: 24px; }
    .sec-label { font-size: 12px; font-weight: 800; color: #aaa; margin-bottom: 8px; }
    .rest-row { display: flex; gap: 10px; margin-bottom: 14px; }
    .rest-col { flex: 1; display: flex; flex-direction: column; gap: 6px; }
    .rest-col label { font-size: 11px; font-weight: 800; color: #aaa; }
    .rest-wrap { position: relative; }
    .rest-num { width: 100%; background: var(--surface2); border: 2px solid #2a2a2a; border-radius: 13px; color: #f5f5f5; font-size: 22px; font-weight: 800; text-align: center; padding: 12px 28px 12px 8px; outline: none; -moz-appearance: textfield; min-height: 54px; }
    .rest-num::-webkit-outer-spin-button, .rest-num::-webkit-inner-spin-button { -webkit-appearance: none; }
    .rest-num:focus { border-color: var(--accent); }
    .rest-num::placeholder { color: #444; font-size: 16px; }
    .rest-unit-abs { position: absolute; right: 10px; top: 50%; transform: translateY(-50%); font-size: 13px; font-weight: 700; color: #999; pointer-events: none; }
    .sets-row { display: flex; gap: 8px; margin-bottom: 14px; }
    .set-col { flex: 1; text-align: center; }
    .set-num { font-size: 11px; color: var(--accent); margin-bottom: 5px; font-weight: 800; }
    .set-input { width: 100%; background: var(--surface2); border: 2px solid #2a2a2a; border-radius: 13px; color: #f5f5f5; font-size: 26px; font-weight: 800; text-align: center; padding: 14px 4px; outline: none; -moz-appearance: textfield; min-height: 62px; }
    .set-input::-webkit-outer-spin-button, .set-input::-webkit-inner-spin-button { -webkit-appearance: none; }
    .set-input:focus { border-color: var(--accent); background: #1a1a1a; }
    .set-input::placeholder { color: #444; font-size: 18px; }
    .set-input.has-value { border-color: rgba(34,197,94,0.4); color: var(--green); }
    .memo-textarea { width: 100%; background: var(--surface2); border: 1.5px solid #2a2a2a; border-radius: 12px; color: var(--text1); font-size: 14px; padding: 12px; outline: none; resize: none; min-height: 90px; font-family: inherit; line-height: 1.6; }
    .memo-textarea::placeholder { color: #444; }
    .memo-textarea:focus { border-color: var(--accent); }

    /* ── Superset Card ── */
    .superset-section { background: #111; border-radius: 13px; padding: 14px; margin-bottom: 6px; }
    .superset-section-label { font-size: 13px; font-weight: 800; color: var(--text1); margin-bottom: 8px; }
    .superset-divider { text-align: center; font-size: 13px; font-weight: 800; color: var(--accent); padding: 6px 0; letter-spacing: 3px; }

    /* ── Add Exercise ── */
    .add-ex-btn { width: 100%; background: #1a1a1a; border: 2px dashed #2a2a2a; color: #555; font-size: 14px; font-weight: 700; padding: 16px; border-radius: 20px; cursor: pointer; margin-bottom: 14px; font-family: inherit; transition: all .2s; }
    .add-ex-btn:hover { border-color: var(--accent); color: var(--accent); }
    .add-form { background: var(--surface); border-radius: 20px; padding: 18px; margin-bottom: 14px; border: 1.5px dashed var(--accent); display: none; }
    .add-form.show { display: block; }
    .add-form-title { font-size: 12px; font-weight: 800; color: var(--accent); letter-spacing: 1px; margin-bottom: 12px; }
    .add-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 12px; }
    .add-field label { font-size: 11px; color: #666; display: block; margin-bottom: 5px; }
    .add-field input { width: 100%; background: #111; border: 1.5px solid #2a2a2a; border-radius: 10px; color: #f0f0f0; font-size: 15px; font-weight: 700; padding: 10px 12px; outline: none; font-family: inherit; }
    .add-field input:focus { border-color: var(--accent); }
    .add-field.full { grid-column: 1 / -1; }
    .add-btns { display: flex; gap: 8px; }
    .add-confirm { flex: 1; background: var(--accent); color: #000; font-size: 14px; font-weight: 800; padding: 12px; border: none; border-radius: 12px; cursor: pointer; font-family: inherit; }
    .add-cancel { flex: 1; background: var(--surface2); color: #888; font-size: 14px; font-weight: 700; padding: 12px; border: 1.5px solid #2a2a2a; border-radius: 12px; cursor: pointer; font-family: inherit; }

    /* ── Complete / Outro ── */
    .complete-btn { width: 100%; background: linear-gradient(135deg, #FF8C42, #FF5C00); color: #000; font-size: 17px; font-weight: 900; border: none; border-radius: 16px; padding: 20px; cursor: pointer; transition: transform .15s; font-family: inherit; margin-top: 6px; }
    .complete-btn:active { transform: scale(0.97); }
    .complete-btn:disabled { background: #333; color: #666; cursor: not-allowed; transform: none; }

    /* ── Slide Complete ── */
    .slide-wrap { position: relative; width: 100%; height: 64px; border-radius: 16px; overflow: hidden; margin-top: 6px; background: #1a1a1a; border: 1.5px solid #252525; }
    .slide-wrap.ready { background: rgba(255,140,66,0.08); border-color: rgba(255,140,66,0.3); }
    .slide-handle { position: absolute; left: 4px; top: 4px; bottom: 4px; width: 56px; border-radius: 12px; background: #2a2a2a; display: flex; align-items: center; justify-content: center; font-size: 24px; color: #444; cursor: not-allowed; touch-action: none; user-select: none; }
    .slide-wrap.ready .slide-handle { background: var(--accent); color: #000; cursor: grab; }
    .slide-label { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; font-size: 14px; font-weight: 800; color: #3a3a3a; pointer-events: none; letter-spacing: 0.3px; }
    .slide-wrap.ready .slide-label { color: rgba(255,140,66,0.55); }
    .done-btn { width: 100%; background: rgba(34,197,94,0.12); border: 1.5px solid rgba(34,197,94,0.35); color: var(--green); font-size: 14px; font-weight: 800; padding: 13px; border-radius: 13px; cursor: pointer; font-family: inherit; margin-top: 14px; transition: all .2s; letter-spacing: 0.3px; }
    .done-btn:active { background: rgba(34,197,94,0.22); }
    .outro-card { margin-top: 6px; padding: 20px; background: rgba(34,197,94,0.07); border: 1.5px solid rgba(34,197,94,0.2); border-radius: 16px; }
    .outro-label { font-size: 10px; font-weight: 800; letter-spacing: 0.14em; text-transform: uppercase; color: var(--green); margin-bottom: 10px; }
    .outro-text { font-size: 15px; line-height: 1.75; white-space: pre-wrap; }

    /* ── Loading / Error / Rest ── */
    .loading { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 80vh; gap: 16px; }
    .spinner { width: 34px; height: 34px; border: 3px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.75s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .loading-text { font-size: 13px; color: var(--text2); }
    .error-card { margin: 40px 0; padding: 20px; background: rgba(239,68,68,0.08); border: 1px solid rgba(239,68,68,0.2); border-radius: 20px; text-align: center; }
    .error-card h3 { color: #ef4444; margin-bottom: 8px; }
    .error-card p { font-size: 13px; color: var(--text2); }
    .rest-day { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 75vh; text-align: center; gap: 12px; }
    .rest-day h2 { font-size: 26px; font-weight: 800; }
    .rest-day p { font-size: 14px; color: var(--text2); }

    /* ── Landing Page ── */
    .landing-nav { display: flex; align-items: center; justify-content: space-between; margin-bottom: 28px; }
    .landing-logo-wrap { display: flex; flex-direction: column; gap: 3px; }
    .landing-logo { font-size: 34px; font-weight: 900; letter-spacing: 0.18em; text-transform: uppercase; color: var(--accent); }
    .settings-icon-btn { background: var(--surface); border: 1.5px solid var(--border); color: var(--text2); width: 40px; height: 40px; border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; font-size: 17px; flex-shrink: 0; transition: all .2s; }
    .settings-icon-btn:active { border-color: var(--accent); }

    .landing-date-block { margin-bottom: 24px; }
    .landing-date-big { font-size: 28px; font-weight: 800; color: var(--text1); line-height: 1.15; margin-bottom: 4px; }
    .landing-day-text { font-size: 14px; color: var(--text2); }

    .week-alert { background: rgba(255,140,66,0.07); border: 1.5px solid rgba(255,140,66,0.25); border-radius: 18px; padding: 16px; margin-bottom: 14px; display: none; }
    .week-alert.show { display: block; }
    .week-alert-eyebrow { font-size: 10px; font-weight: 800; letter-spacing: 0.12em; text-transform: uppercase; color: var(--accent); margin-bottom: 8px; }
    .week-alert-body { font-size: 14px; font-weight: 700; color: var(--text1); margin-bottom: 4px; }
    .week-alert-range { font-size: 12px; color: var(--text2); margin-bottom: 14px; }
    .week-alert-btn { width: 100%; background: var(--accent); color: #000; font-size: 13px; font-weight: 800; padding: 12px; border: none; border-radius: 12px; cursor: pointer; font-family: inherit; transition: opacity .2s; }
    .week-alert-btn:disabled { opacity: 0.5; cursor: not-allowed; }

    .today-card { background: var(--surface); border: 1.5px solid var(--border); border-radius: 20px; padding: 22px; margin-bottom: 14px; min-height: 110px; display: flex; flex-direction: column; justify-content: center; }
    .today-card-eyebrow { font-size: 10px; font-weight: 800; letter-spacing: 0.12em; text-transform: uppercase; color: var(--text3); margin-bottom: 14px; }
    .skel-wrap { display: flex; flex-direction: column; gap: 9px; }
    .skel { height: 13px; border-radius: 6px; background: linear-gradient(90deg, var(--surface2) 25%, #252525 50%, var(--surface2) 75%); background-size: 200% 100%; animation: shimmer 1.4s infinite; }
    @keyframes shimmer { to { background-position: -200% 0; } }

    .status-rest-emoji { font-size: 30px; margin-bottom: 10px; }
    .status-rest-title { font-size: 20px; font-weight: 800; margin-bottom: 4px; }
    .status-rest-sub { font-size: 13px; color: var(--text2); }
    .status-badge { display: inline-block; background: var(--accent); color: #000; font-size: 11px; font-weight: 900; padding: 4px 11px; border-radius: 20px; letter-spacing: 1.5px; margin-bottom: 10px; }
    .status-count { font-size: 28px; font-weight: 800; color: var(--text1); }
    .status-count span { font-size: 14px; font-weight: 600; color: var(--text2); margin-left: 5px; }

    .landing-start-btn { width: 100%; background: linear-gradient(135deg, #FF8C42, #FF5C00); color: #000; font-size: 17px; font-weight: 900; border: none; border-radius: 16px; padding: 20px; cursor: pointer; font-family: inherit; margin-bottom: 10px; transition: transform .15s; letter-spacing: 0.3px; }
    .landing-start-btn:active { transform: scale(0.97); }
    .landing-start-btn:disabled { background: #2a2a2a; color: #555; cursor: not-allowed; transform: none; }
    .landing-ghost-btn { width: 100%; background: none; color: var(--text2); font-size: 14px; font-weight: 700; border: 1.5px solid var(--border2); border-radius: 16px; padding: 14px; cursor: pointer; font-family: inherit; margin-bottom: 10px; transition: all .2s; }
    .landing-ghost-btn:active { border-color: #555; color: var(--text1); }

    /* ── Settings Page ── */
    .page-header { display: flex; align-items: center; gap: 14px; margin-bottom: 24px; }
    .back-btn { background: var(--surface); border: 1.5px solid var(--border); color: var(--text2); font-size: 14px; font-weight: 700; padding: 8px 14px; border-radius: 20px; cursor: pointer; font-family: inherit; flex-shrink: 0; }
    .page-title { font-size: 16px; font-weight: 800; color: var(--text1); }

    .settings-group { background: var(--surface); border: 1.5px solid var(--border); border-radius: 20px; padding: 18px; margin-bottom: 14px; }
    .settings-group-label { font-size: 10px; font-weight: 800; letter-spacing: 0.12em; text-transform: uppercase; color: var(--accent); margin-bottom: 14px; }
    .settings-row { padding: 12px 0; border-bottom: 1px solid var(--border); }
    .settings-row:last-child { border-bottom: none; padding-bottom: 0; }
    .settings-row:first-of-type { padding-top: 0; }
    .settings-row-head { display: flex; align-items: center; justify-content: space-between; gap: 12px; }
    .settings-row-label { font-size: 14px; font-weight: 600; color: var(--text1); }
    .settings-row-sub { font-size: 12px; color: var(--text2); margin-top: 3px; }

    .day-select { background: var(--surface2); border: 1.5px solid var(--border2); border-radius: 10px; color: var(--text1); font-size: 14px; font-weight: 700; padding: 8px 12px; outline: none; font-family: inherit; flex-shrink: 0; }

    .day-chips { display: flex; flex-wrap: wrap; gap: 7px; margin-top: 13px; }
    .day-chip { background: var(--surface2); border: 1.5px solid var(--border2); color: var(--text2); font-size: 12px; font-weight: 700; padding: 7px 12px; border-radius: 20px; cursor: pointer; font-family: inherit; transition: all .15s; }
    .day-chip.on { background: rgba(255,140,66,0.1); border-color: var(--accent); color: var(--accent); }

    .toggle-wrap { position: relative; width: 44px; height: 24px; flex-shrink: 0; }
    .toggle-wrap input { opacity: 0; width: 0; height: 0; position: absolute; }
    .toggle-slider { position: absolute; inset: 0; background: #2a2a2a; border-radius: 24px; cursor: pointer; transition: .2s; }
    .toggle-slider::before { content: ''; position: absolute; width: 18px; height: 18px; left: 3px; top: 3px; background: #555; border-radius: 50%; transition: .2s; }
    .toggle-wrap input:checked + .toggle-slider { background: rgba(255,140,66,0.25); }
    .toggle-wrap input:checked + .toggle-slider::before { transform: translateX(20px); background: var(--accent); }

    .url-input { width: 100%; background: var(--surface2); border: 1.5px solid var(--border2); border-radius: 10px; color: var(--text1); font-size: 13px; padding: 10px 12px; outline: none; font-family: inherit; margin-top: 10px; }
    .url-input:focus { border-color: var(--accent); }

<body>
<div id="app"></div>
<div id="popup-container"></div>
<script>
/* ================================================================
   index.html — 핸니의 체육관 프론트엔드
   ─────────────────────────────────────────────────────────────────
   v1.7 변경사항:
   - GAS 배포 URL 업데이트 (v1.8)
   - saveResult payload: targetReps 추가 (일반 + 슈퍼세트 서브종목)
   - 지난운동 검색 기능 추가 (요일별 / 종목별)
   - 랜딩 페이지: 🔍 기록 검색 버튼 추가
   - 대시보드: 뒤로가기 행 우측 🔍 버튼 추가
   ================================================================ */

/* ================================================================
   🔧 GAS 설정 — URL 변경 시 여기만 수정
   ================================================================ */
const CONFIG = {
  url:   'https://script.google.com/macros/s/AKfycbxE-MSdocXWxos0PRAITQ94bwhlJVBX8iohARnKxuH3_h1-w-OXcupRH3kd6gi8Mzs--w/exec',
  token: 'jty5375'
};
/* ================================================================ */

/* ── Settings ──────────────────────────────────────────────── */
const SETTINGS_KEY = 'gc_settings';

function defaultSettings() {
  return { startDay: 1, sheetUrl: '', testMode: false, restDays: { weekRange: '', days: [] } };
}
function getSettings() {
  try { const r = localStorage.getItem(SETTINGS_KEY); return r ? { ...defaultSettings(), ...JSON.parse(r) } : defaultSettings(); }
  catch { return defaultSettings(); }
}
function saveSettingsData(s) { localStorage.setItem(SETTINGS_KEY, JSON.stringify(s)); }

/* ── App State ─────────────────────────────────────────────── */
let missionCache   = null;
let weekStatus     = null;
let missionLoading = true;
// Dashboard state
let missionData    = null;
let exercises      = [];
let skipped        = {};
let editingCards   = {};
let programEditMode = false;
let programName    = '';
let showAddForm    = false;
let introText      = null;
let collapsedCards = {};
let doneCards       = {};
let completedCards  = {};
let repsData       = {};
let memoData       = {};
let restData       = {};
let weightData     = {};
let isFreeWorkout  = false;
let ssSubCount     = 2;
let importTarget   = null;

// Search state
let searchTab          = 'day';
let searchDaySelected  = null;
let searchDates        = [];
let searchDateSelected = null;
let searchExSelected   = null;

/* ── API ───────────────────────────────────────────────────── */
async function apiGet(params) {
  const url = new URL(CONFIG.url);
  url.searchParams.set('token', CONFIG.token);
  Object.entries(params).forEach(([k,v]) => url.searchParams.set(k, v));
  const res = await fetch(url.toString(), { redirect: 'follow' });
  return res.json();
}
async function apiPost(body) {
  const res = await fetch(CONFIG.url, {
    method: 'POST', headers: { 'Content-Type': 'text/plain' },
    body: JSON.stringify({ token: CONFIG.token, ...body }), redirect: 'follow',
  });
  return res.json();
}

/* ── Mock data (테스트 모드) ────────────────────────────────── */
function getMockMission() {
  const today = new Date();
  const dayNames = ['일','월','화','수','목','금','토'];
  return {
    date: toIso(today), day: dayNames[today.getDay()],
    routineName: '테스트: 상체 A',
    exercises: [
      { name: '벤치프레스', sets: 4, tag: null, isSuperset: false, targetWeight: 80, targetReps: 8, memo: '' },
      {
        name: '상체 슈퍼세트', sets: 3, tag: null, isSuperset: true,
        subExercises: [
          { name: '인클라인 벤치프레스', variation: '', targetWeight: 35, targetReps: 10, memo: '' },
          { name: '티바 머신 로우',      variation: '', targetWeight: 35, targetReps: 10, memo: '' },
        ],
      },
      { name: '케이블 크로스오버', sets: 3, tag: null, isSuperset: false, variation: '', targetWeight: 15, targetReps: 12, memo: '' },
    ],
    lastWeekLog: [
      { name: '벤치프레스',         variation: '', sets: 4, reps: ['8','8','7','7'], weight: 80 },
      { name: '인클라인 벤치프레스', variation: '', sets: 3, reps: ['10','9','9'],   weight: 35 },
      { name: '티바 머신 로우',      variation: '', sets: 3, reps: ['10','10','9'],  weight: 35 },
    ],
  };
}

/* ── Date helpers ──────────────────────────────────────────── */
function toIso(date) {
  return `${date.getFullYear()}-${String(date.getMonth()+1).padStart(2,'0')}-${String(date.getDate()).padStart(2,'0')}`;
}
function getThisWeekRange() {
  const today = new Date(), day = today.getDay();
  const mon   = new Date(today); mon.setDate(today.getDate() + ((day === 0) ? -6 : 1 - day));
  const sun   = new Date(mon);   sun.setDate(mon.getDate() + 6);
  return { start: toIso(mon), end: toIso(sun), range: `${toIso(mon)} ~ ${toIso(sun)}` };
}
function isRestDayToday() {
  const s = getSettings(), w = getThisWeekRange(), today = toIso(new Date());
  const customRest = s.restDays.weekRange === w.range && s.restDays.days.includes(today);
  const apiRest    = missionCache && (!missionCache.exercises || missionCache.exercises.length === 0);
  return customRest || apiRest;
}

/* ── Landing Page ──────────────────────────────────────────── */
function renderLanding() {
  const now = new Date();
  const dayShorts = ['SUN', 'MON', 'TUE', 'WED', 'THU', 'FRI', 'SAT'];
  const dayAbbr = dayShorts[now.getDay()];
  const y = now.getFullYear(), m = now.getMonth() + 1, d = now.getDate();

  document.getElementById('app').innerHTML = `
    <div class="landing-nav">
      <div class="landing-logo-wrap">
        <span class="landing-logo" style="font-size:28px;letter-spacing:0.05em;text-transform:none;">🏋️핸니의 체육관🏋️</span>
      </div>
      <button class="settings-icon-btn" onclick="renderSettings()" aria-label="설정">⚙️</button>
    </div>
    <div class="landing-date-block" style="display: flex; justify-content: space-between; align-items: flex-end; margin-bottom: 24px;">
      <div class="landing-date-big">${y}년 ${m}월 ${d}일</div>
      <div class="landing-day-text" style="color: var(--accent); font-weight: 900; font-size: 20px; text-align: right; margin: 0;">${dayAbbr}.</div>
    </div>
    <div style="margin-bottom: 10px; display:flex; gap:8px;">
      <button class="routine-nav-btn" onclick="renderRoutineDoc()">📄운동루틴</button>
      <button class="routine-nav-btn" onclick="renderSearchHistory()">🔍 기록 검색</button>
    </div>
    <div class="week-alert" id="week-alert">
      <div class="week-alert-eyebrow">📋 주차 미등록</div>
      <div class="week-alert-body">이번 주차 중량 계획이 등록되지 않았어요</div>
      <div class="week-alert-range" id="week-alert-range">-</div>
      <button class="week-alert-btn" id="week-alert-btn" onclick="onRegisterWeek()">스프레드시트에서 등록하기 →</button>
    </div>
    <div class="today-card">
      <div class="today-card-eyebrow">오늘의 운동</div>
      <div id="today-status-body">
        <div class="skel-wrap">
          <div class="skel" style="width:32%;height:22px"></div>
          <div class="skel" style="width:54%;height:14px;margin-top:4px"></div>
        </div>
      </div>
    </div>
    <div id="start-btn-area">
      <button class="landing-start-btn" id="start-btn" onclick="startWorkout()">운동 시작하기 →</button>
      <button class="landing-ghost-btn" onclick="startFreeWorkout()">🏃 자유 운동하기</button>
    </div>`;
}

function updateLandingStatus() {
  const bodyEl    = document.getElementById('today-status-body');
  const startArea = document.getElementById('start-btn-area');
  if (!bodyEl) return;

  if (isRestDayToday()) {
    const s = getSettings(), w = getThisWeekRange();
    const isCustom = s.restDays.weekRange === w.range && s.restDays.days.includes(toIso(new Date()));
    bodyEl.innerHTML = `
      <div class="status-rest-emoji">💤</div>
      <div class="status-rest-title">오늘은 쉬는 날</div>
      <div class="status-rest-sub">${isCustom ? '일정으로 지정한 휴식일이에요' : '회복도 훈련이에요'}</div>`;
    if (startArea) startArea.innerHTML =
      `<button class="landing-ghost-btn" onclick="startWorkout()">그래도 시작하기</button>`;
    return;
  }

  if (!missionCache || missionCache.error) return;

  const count  = missionCache.exercises?.length || 0;
  const rName  = missionCache.routineName || '';
  const display = rName.includes(':') ? rName.split(':').slice(1).join(':').trim() : rName;
  bodyEl.innerHTML = `
    <span class="status-badge">${display}</span>
    <div class="status-count">${count}가지<span>운동 준비됨</span></div>`;
}

function updateWeekAlert() {
  const alertEl = document.getElementById('week-alert');
  if (!alertEl || !weekStatus) return;
  if (!weekStatus.registered) {
    alertEl.classList.add('show');
    const rangeEl = document.getElementById('week-alert-range');
    if (rangeEl) rangeEl.textContent = weekStatus.weekRange;
  }
}

async function onRegisterWeek() {
  const btn = document.getElementById('week-alert-btn');
  if (btn) { btn.disabled = true; btn.textContent = '등록 중...'; }
  try {
    const result = await apiPost({ action: 'registerWeek' });
    if (result.success) {
      const { sheetUrl } = getSettings();
      if (sheetUrl && btn) {
        btn.outerHTML = `<a href="${sheetUrl}" target="_blank" class="week-alert-btn" style="display:block;text-align:center;text-decoration:none;">✓ 등록됐어요! 스프레드시트 열기 →</a>`;
      } else if (btn) {
        btn.textContent = '✓ 등록됐어요!';
        btn.disabled = true;
        setTimeout(() => {
          const el = document.getElementById('week-alert');
          if (el) el.classList.remove('show');
        }, 1800);
      }
    }
  } catch(err) {
    if (btn) { btn.disabled = false; btn.textContent = '스프레드시트에서 등록하기 →'; }
    alert('오류: ' + err.message);
  }
}

/* ── Settings Page ─────────────────────────────────────────── */
function renderSettings() {
  const s    = getSettings();
  const week = getThisWeekRange();
  const dayFull  = ['일요일','월요일','화요일','수요일','목요일','금요일','토요일'];
  const dayShort = ['일','월','화','수','목','금','토'];

  const today = new Date(), diff = (today.getDay() === 0) ? -6 : 1 - today.getDay();
  const mon   = new Date(today); mon.setDate(today.getDate() + diff);
  const thisWeekRest = s.restDays.weekRange === week.range ? s.restDays.days : [];
  let chipHTML = '';
  for (let i = 0; i < 7; i++) {
    const d = new Date(mon); d.setDate(mon.getDate() + i);
    const iso = toIso(d), label = dayShort[d.getDay()] + ' ' + d.getDate();
    chipHTML += `<button class="day-chip${thisWeekRest.includes(iso) ? ' on' : ''}" data-date="${iso}" onclick="this.classList.toggle('on')">${label}</button>`;
  }

  let dayOptions = '';
  for (let i = 1; i <= 7; i++) {
    const idx = i % 7;
    dayOptions += `<option value="${idx}"${s.startDay === idx ? ' selected' : ''}>${dayFull[idx]}</option>`;
  }

  document.getElementById('app').innerHTML = `
    <div class="page-header" style="display: flex; justify-content: space-between; align-items: center; width: 100%;">
      <div style="display: flex; align-items: center; gap: 14px;">
        <button class="back-btn" onclick="goBackFromSettings()">← 뒤로</button>
        <span class="page-title">환경설정</span>
      </div>
      <span class="logo" style="font-size:16px;font-weight:900;letter-spacing:0.03em;text-transform:none;">🏋️핸니의 체육관🏋️</span>
    </div>

    <div class="settings-group">
      <div class="settings-group-label">⏱ 루틴 설정</div>
      <div class="settings-row">
        <div class="settings-row-head">
          <div>
            <div class="settings-row-label">루틴 시작 요일</div>
            <div class="settings-row-sub">주차 등록 알림 기준일</div>
          </div>
          <select class="day-select" id="startDaySelect">${dayOptions}</select>
        </div>
      </div>
      <div class="settings-row">
        <div class="settings-row-label">이번 주 쉬는 날</div>
        <div class="settings-row-sub">일정 충돌로 빠지는 날을 선택하세요</div>
        <div class="day-chips" id="rest-day-chips">${chipHTML}</div>
      </div>

function applyInline(text) {
  return text.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>').replace(/`(.+?)`/g, '<code>$1</code>');
}
function renderMarkdown(md) {
  const lines = md.split('\n');
  let html = '', inList = false;
  for (const line of lines) {
    if (/^---+$/.test(line.trim())) {
      if (inList) { html += '</ul>'; inList = false; } html += '<hr>';
    } else if (/^### (.+)/.test(line)) {
      if (inList) { html += '</ul>'; inList = false; } html += `<h3>${applyInline(line.replace(/^### /,''))}</h3>`;
    } else if (/^## (.+)/.test(line)) {
      if (inList) { html += '</ul>'; inList = false; } html += `<h2>${applyInline(line.replace(/^## /,''))}</h2>`;
    } else if (/^# (.+)/.test(line)) {
      if (inList) { html += '</ul>'; inList = false; } html += `<h1>${applyInline(line.replace(/^# /,''))}</h1>`;
    } else if (/^[-*] (.+)/.test(line) || /^\d+\. (.+)/.test(line)) {
      if (!inList) { html += '<ul>'; inList = true; }
      html += `<li>${applyInline(line.replace(/^[-*] /,'').replace(/^\d+\. /,''))}</li>`;
    } else if (line.trim() === '') {
      if (inList) { html += '</ul>'; inList = false; } html += '<br>';
    } else {
      if (inList) { html += '</ul>'; inList = false; } html += `<p>${applyInline(line)}</p>`;
    }
  }
  if (inList) html += '</ul>';
  return html;
}

function renderCollapsibleMarkdown(md) {
  const lines = md.split('\n');
  let sections = [], currentSection = null;

  for (const line of lines) {
    if (/^## (.+)/.test(line)) {
      if (currentSection) sections.push(currentSection);
      currentSection = { title: line.replace(/^## /, ''), lines: [] };
    } else if (currentSection) {
      currentSection.lines.push(line);
    }
  }
  if (currentSection) sections.push(currentSection);
  sections = sections.slice().reverse();

  let html = '';
  sections.forEach((sec, idx) => {
    const bodyHtml = renderRoutineBody(sec.lines.join('\n'));
    html += `<div class="routine-section">
        <button class="routine-section-header" onclick="toggleRoutineSection(${idx})">
          <span class="routine-section-title">${applyInline(sec.title)}</span>
          <span class="routine-section-icon" id="rs-icon-${idx}">›</span>
        </button>
        <div class="routine-section-body" id="rs-body-${idx}" style="display:none">${bodyHtml}</div>
      </div>`;
  });
  return html;
}

function renderRoutineBody(md) {
  const lines = md.split('\n');
  let html = '';
  let inMeta = true, metaItems = [];
  let inOL = false, inUL = false;
  let firstH3 = true;

  const flushLists = () => {
    if (inOL) { html += '</ol>'; inOL = false; }
    if (inUL) { html += '</ul>'; inUL = false; }
  };
  const flushMeta = () => {
    if (metaItems.length) {
      html += '<div class="rs-meta-block"><ul class="rs-meta-list">' +
        metaItems.map(m => '<li>' + m + '</li>').join('') +
        '</ul></div>';
      metaItems = [];
    }
    inMeta = false;
  };

  for (const line of lines) {
    if (/^---+$/.test(line.trim())) continue;
    if (/^### (.+)/.test(line)) {
      if (inMeta) flushMeta();
      flushLists();
      html += '<div class="rs-h3' + (firstH3 ? ' first' : '') + '">' + applyInline(line.replace(/^### /, '')) + '</div>';
      firstH3 = false;
    } else if (inMeta) {
      if (/^[-*] (.+)/.test(line)) {
        metaItems.push(applyInline(line.replace(/^[-*] /, '')));
      } else if (line.trim() && !/^#/.test(line)) {
        metaItems.push(applyInline(line));
      }
    } else if (/^\d+\. (.+)/.test(line)) {
      if (inUL) { html += '</ul>'; inUL = false; }
      if (!inOL) { html += '<ol class="rs-ex-list">'; inOL = true; }
      html += '<li>' + applyInline(line.replace(/^\d+\. /, '')) + '</li>';
    } else if (/^[-*] (.+)/.test(line)) {
      if (inOL) { html += '</ol>'; inOL = false; }
      if (!inUL) { html += '<ul class="rs-ex-list">'; inUL = true; }
      html += '<li>' + applyInline(line.replace(/^[-*] /, '')) + '</li>';
    } else if (line.trim() === '') {
      flushLists();
    } else if (line.trim()) {
      flushLists();
      html += '<p>' + applyInline(line) + '</p>';
    }
  }
  flushLists();
  return html;
}

/* ── Start Workout ─────────────────────────────────────────── */
async function startWorkout() {
  const s = getSettings();
  if (missionLoading) {
    const btn = document.getElementById('start-btn');
    if (btn) { btn.disabled = true; btn.textContent = '불러오는 중...'; }
    await new Promise(resolve => {
      const t = setInterval(() => { if (!missionLoading) { clearInterval(t); resolve(); } }, 100);
    });
  }
  if (!missionCache || missionCache.error) {
    renderError(missionCache?.error || '미션 데이터를 불러올 수 없어요'); return;
  }
  if (!missionCache.exercises || missionCache.exercises.length === 0) {
    renderRestDay(); return;
  }

  missionData = missionCache;
  const lastLog = missionData.lastWeekLog || [];
  const norm    = str => str.replace(/\s/g,'');
  exercises = missionData.exercises.map((ex, i) => {
    if (ex.isSuperset) {
      const subExercises = (ex.subExercises || []).map(sub => {
        const lastEx = lastLog.find(l => norm(l.name) === norm(sub.name));
        return {
          name: sub.name, variation: sub.variation || '',
          targetWeight: sub.targetWeight || 0, targetReps: sub.targetReps || 0,
          lastRecord: lastEx ? `${lastEx.weight}kg · ${lastEx.reps.join(', ')}회` : null,
        };
      });
      return { id: i+1, name: ex.name, sets: ex.sets, tag: ex.tag||null, isSuperset: true, subExercises };
    }
    const lastEx     = lastLog.find(l => norm(l.name) === norm(ex.name));
    const lastRecord = lastEx ? `${lastEx.weight}kg · ${lastEx.reps.join(', ')}회` : null;
    return { id: i+1, name: ex.name, sets: ex.sets, tag: ex.tag||null, isSuperset: false, variation: ex.variation||'', targetWeight: ex.targetWeight||0, targetReps: ex.targetReps||0, lastRecord };
  });
  programName  = missionData.routineName.includes(':') ? missionData.routineName.split(':').slice(1).join(':').trim() : missionData.routineName;
  skipped = {}; editingCards = {}; showAddForm = false; introText = null; collapsedCards = {};
  doneCards = {}; completedCards = {};
  repsData = {}; memoData = {}; restData = {}; weightData = {}; isFreeWorkout = false;
  renderMain();
}

}

/* ── Render cards ──────────────────────────────────────────── */
function renderCards() {
  const container = document.getElementById('cards');
  if (!container) return;
  container.innerHTML = '';
  exercises.forEach((ex, idx) => {
    const isCollapsed = !!collapsedCards[ex.id];
    const isEditing   = !!editingCards[ex.id];
    const isSkipped   = !!skipped[ex.id];

    if (isCollapsed) {
      const card = document.createElement('div');
      card.id = `card-${idx}`;
      card.className = 'ex-card completed collapsed';
      card.onclick = () => { collapsedCards[ex.id] = false; renderCards(); };
      card.innerHTML = `
        <div class="card-top-row" style="align-items:center">
          <div class="card-info">
            <div class="ex-name" style="margin-bottom:0">${ex.name}</div>
          </div>
          <span style="font-size:22px;color:var(--green);flex-shrink:0">✓</span>
        </div>`;
      container.appendChild(card);
      return;
    }

    if (ex.isSuperset) {
      const subLabels = ['🅐', '🅑', '🅒'];
      let sectionsHTML = '';
      (ex.subExercises || []).forEach((sub, subIdx) => {
        const tgt = `${sub.targetWeight||0}kg × ${sub.targetReps||'-'}회`;
        const lastBadge = sub.lastRecord
          ? `<span class="meta-tag last" style="font-size:11px">지난: ${sub.lastRecord}</span>` : '';
        let setsHTML = '';
        for (let s = 1; s <= ex.sets; s++) {
          const key = `${ex.id}_${subIdx}`;
          const sv = repsData[key]?.[s] || '';
          const wStored = weightData[key]?.[s];
          const wVal = (wStored !== undefined && wStored !== '') ? wStored : (sub.targetWeight || 0);
          const wMod = (wStored !== undefined && wStored !== '' && parseFloat(wStored) !== (sub.targetWeight || 0));
          setsHTML += `<div class="set-col"><div class="set-num">${s}세트</div><input class="set-weight-input${wMod?' modified':''}" id="ew${ex.id}_${subIdx}s${s}" type="number" min="0" max="999" placeholder="${sub.targetWeight||0}" inputmode="decimal" value="${wVal}" oninput="onSupersetWeightInput(${idx},${subIdx},${s})"><input class="set-input${sv?' has-value':''}" id="e${ex.id}_${subIdx}s${s}" type="number" min="0" max="999" placeholder="${sub.targetReps||'-'}" inputmode="numeric" value="${sv}" oninput="onSupersetInput(${idx},${subIdx})"></div>`;
        }
        if (subIdx > 0) sectionsHTML += `<div class="superset-divider">⚡ ⚡ ⚡</div>`;
        sectionsHTML += `
          <div class="superset-section">
            <div class="superset-section-label">${subLabels[subIdx]||''} ${sub.name}</div>
            <div style="color:var(--accent);font-size:14px;font-weight:800;margin-bottom:8px;">🎯 ${tgt}</div>
            <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;">
              <span class="sec-label" style="margin-bottom:0;">수행 결과</span>${lastBadge}
            </div>
            <div class="sets-row">${setsHTML}</div>
          </div>`;
      });
      const sharedBody = !isSkipped ? `
        <div class="sec-label" style="margin-top:14px;">휴식시간</div>
        <div class="rest-row">
          <div class="rest-col"><div class="rest-wrap"><input class="rest-num" id="e${ex.id}min" type="number" min="0" max="60" placeholder="-" inputmode="numeric" value="${restData[ex.id]?.min||''}" oninput="onRestInput(${ex.id},'min',this.value)"><span class="rest-unit-abs">분</span></div></div>
          <div class="rest-col"><div class="rest-wrap"><input class="rest-num" id="e${ex.id}sec" type="number" min="0" max="59" placeholder="-" inputmode="numeric" value="${restData[ex.id]?.sec||''}" oninput="onRestInput(${ex.id},'sec',this.value)"><span class="rest-unit-abs">초</span></div></div>
        </div>
        <div class="sec-label">메모</div>
        <textarea class="memo-textarea" id="e${ex.id}memo" placeholder="특이사항, 느낌 등…" oninput="memoData[${ex.id}]=this.value">${memoData[ex.id]||''}</textarea>` : '';
      const ssRightBtns = `<div class="card-btns">
        <button class="card-btn${isSkipped?' skip-on':''}" onclick="toggleSkip(${ex.id})">${isSkipped?'생략됨':'생략'}</button>
        <div class="skip-arrow-row">
          <button class="arrow-btn" onclick="moveEx(${idx},-1)">↑</button>
          <button class="arrow-btn" onclick="moveEx(${idx},1)">↓</button>
        </div>
      </div>`;
      const card = document.createElement('div');
      card.id = `card-${idx}`;
      card.className = `ex-card${isSkipped?' skipped':''}`;
      const ssDoneBtn = !isSkipped && (doneCards[ex.id] || completedCards[ex.id])
        ? `<button class="done-btn" onclick="onCardDone(${ex.id})">${completedCards[ex.id] ? '✓ 수정 완료' : '✓ 운동 완료'}</button>` : '';
      card.innerHTML = `<div class="card-top"><div class="card-top-row"><div class="card-info"><div class="ex-name">${ex.name}</div><div style="font-size:11px;color:var(--accent);margin-top:3px;font-weight:700;">⚡ 슈퍼세트 · ${ex.sets}세트</div></div>${ssRightBtns}</div></div>${sectionsHTML}${sharedBody}${ssDoneBtn}`;
      container.appendChild(card);
      return;
    }

    const hasTarget = ex.targetWeight > 0 && ex.targetReps > 0;
    const targetText = hasTarget
      ? `${ex.targetWeight}kg × ${ex.targetReps}회 × ${ex.sets}세트`
      : `${ex.targetWeight||0}kg × ${ex.targetReps||'-'}회 × ${ex.sets}세트`;

    let metaHTML = `
      <div style="display: flex; align-items: center; width: 100%;">
        <span style="color: var(--accent); font-size: 16px; font-weight: 800;">🎯 ${targetText}</span>
      </div>
    `;
    if (ex.tag) {
      metaHTML += `<div class="meta-tag" style="margin-top: 6px; display: inline-block;">${ex.tag}</div>`;
    }

    const editFieldsHTML = isEditing ? `
      <div class="edit-fields">
        <div class="edit-row"><span class="edit-label">이름</span><input class="edit-input" style="font-size:15px" value="${ex.name}" oninput="exercises[${idx}].name=this.value;document.getElementById('exname-${idx}').textContent=this.value"></div>

        <div class="edit-row"><span class="edit-label">세트</span><input class="edit-input" type="number" value="${ex.sets}" style="max-width:60px" oninput="exercises[${idx}].sets=Number(this.value);renderCards()" inputmode="numeric"><span class="edit-unit">세트</span></div>
        <div class="edit-row"><span class="edit-label">목표</span><input class="edit-input" type="number" value="${ex.targetReps||0}" style="max-width:60px" oninput="exercises[${idx}].targetReps=Number(this.value)" inputmode="numeric"><span class="edit-unit">회</span></div>
      </div>` : '';

    let setsHTML = '';
    for (let s = 1; s <= ex.sets; s++) {
      const sv = repsData[ex.id]?.[s] || '';
      const wStored = weightData[ex.id]?.[s];
      const wVal = (wStored !== undefined && wStored !== '') ? wStored : (ex.targetWeight || 0);
      const wMod = (wStored !== undefined && wStored !== '' && parseFloat(wStored) !== (ex.targetWeight || 0));
      setsHTML += `<div class="set-col"><div class="set-num">${s}세트</div><input class="set-weight-input${wMod?' modified':''}" id="ew${ex.id}s${s}" type="number" min="0" max="999" placeholder="${ex.targetWeight||0}" inputmode="decimal" value="${wVal}" oninput="onWeightInput(${idx},${s})"><input class="set-input${sv?' has-value':''}" id="e${ex.id}s${s}" type="number" min="0" max="999" placeholder="${ex.targetReps||'-'}" inputmode="numeric" value="${sv}" oninput="onSetInput(${idx})"></div>`;
    }
    const lastRecordBadge = ex.lastRecord ? `<span class="meta-tag last" style="font-size:11px">지난: ${ex.lastRecord}</span>` : '';
    const bodyHTML = !isEditing && !isSkipped ? `
      <div class="sec-label" style="margin-top: 10px;">휴식시간</div>
      <div class="rest-row">
        <div class="rest-col"><div class="rest-wrap"><input class="rest-num" id="e${ex.id}min" type="number" min="0" max="60" placeholder="-" inputmode="numeric" value="${restData[ex.id]?.min||''}" oninput="onRestInput(${ex.id},'min',this.value)"><span class="rest-unit-abs">분</span></div></div>
        <div class="rest-col"><div class="rest-wrap"><input class="rest-num" id="e${ex.id}sec" type="number" min="0" max="59" placeholder="-" inputmode="numeric" value="${restData[ex.id]?.sec||''}" oninput="onRestInput(${ex.id},'sec',this.value)"><span class="rest-unit-abs">초</span></div></div>
      </div>
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;">
        <div class="sec-label" style="margin-bottom:0;">수행 결과</div>
        ${lastRecordBadge}
      </div>
      <div class="sets-row">${setsHTML}</div>
      <div class="sec-label">메모</div>
      <textarea class="memo-textarea" id="e${ex.id}memo" placeholder="특이사항, 느낌 등…" oninput="memoData[${ex.id}]=this.value">${memoData[ex.id]||''}</textarea>` : '';

    const rightBtns = isEditing
      ? `<div class="card-btns"><button class="card-btn delete" onclick="deleteEx(${idx})">× 삭제</button><button class="card-btn edit-on" onclick="toggleCardEdit(${ex.id})">✓ 완료</button></div>`
      : `<div class="card-btns">
          <button class="card-btn${isSkipped?' skip-on':''}" onclick="toggleSkip(${ex.id})">${isSkipped?'생략됨':'생략'}</button>
          <div class="skip-arrow-row">
            <button class="arrow-btn" onclick="moveEx(${idx},-1)">↑</button>
            <button class="arrow-btn" onclick="moveEx(${idx},1)">↓</button>
          </div>
          <button class="card-btn" onclick="toggleCardEdit(${ex.id})">✏️ 편집</button>
         </div>`;

    const card = document.createElement('div');
    card.id = `card-${idx}`;
    card.className = `ex-card${isEditing?' editing':''}${isSkipped?' skipped':''}`;
    const normalDoneBtn = !isEditing && !isSkipped && (doneCards[ex.id] || completedCards[ex.id])
      ? `<button class="done-btn" onclick="onCardDone(${ex.id})">${completedCards[ex.id] ? '✓ 수정 완료' : '✓ 운동 완료'}</button>` : '';
    card.innerHTML = `<div class="card-top"><div class="card-top-row"><div class="card-info"><div class="ex-name" id="exname-${idx}">${ex.name}</div></div>${rightBtns}</div><div style="margin-top:8px">${metaHTML}</div></div>${editFieldsHTML}${bodyHTML}${normalDoneBtn}`;
    container.appendChild(card);
  });
  updateSlideBtn();
}

/* ── Card interactions ─────────────────────────────────────── */
function onSetInput(idx) {
  const ex = exercises[idx]; let all = true;
  if (!repsData[ex.id]) repsData[ex.id] = {};
  for (let s = 1; s <= ex.sets; s++) {
    const el = document.getElementById(`e${ex.id}s${s}`);
    const val = el?.value || '';
    if (val) { el.classList.add('has-value'); repsData[ex.id][s] = val; }
    else { el?.classList.remove('has-value'); repsData[ex.id][s] = ''; all = false; }
  }
  if (all) { doneCards[ex.id] = true; renderCards(); }
}
function onRestInput(id, field, val) {
  if (!restData[id]) restData[id] = {};
  restData[id][field] = val;
}
function onSupersetInput(idx, subIdx) {
  const ex  = exercises[idx];
  const key = `${ex.id}_${subIdx}`;
  if (!repsData[key]) repsData[key] = {};
  for (let s = 1; s <= ex.sets; s++) {
    const el  = document.getElementById(`e${ex.id}_${subIdx}s${s}`);
    const val = el?.value || '';
    if (val) { el.classList.add('has-value'); repsData[key][s] = val; }
    else     { el?.classList.remove('has-value'); repsData[key][s] = ''; }
  }
  const numSubs = ex.subExercises?.length || 0;
  const allDone = Array.from({ length: numSubs }, (_, si) => {
    const k = `${ex.id}_${si}`;
    return Array.from({ length: ex.sets }, (_, s) => !!(repsData[k]?.[s+1])).every(Boolean);
  }).every(Boolean);
  if (allDone) { doneCards[ex.id] = true; renderCards(); }
}
function onWeightInput(idx, setNum) {
  const ex = exercises[idx];
  const el = document.getElementById(`ew${ex.id}s${setNum}`);
  const val = el?.value ?? '';
  if (!weightData[ex.id]) weightData[ex.id] = {};
  weightData[ex.id][setNum] = val;
  const isModified = val !== '' && parseFloat(val) !== (ex.targetWeight || 0);
  el?.classList.toggle('modified', isModified);
}
function onSupersetWeightInput(idx, subIdx, setNum) {
  const ex  = exercises[idx];
  const key = `${ex.id}_${subIdx}`;
  const el  = document.getElementById(`ew${ex.id}_${subIdx}s${setNum}`);
  const val = el?.value ?? '';
  if (!weightData[key]) weightData[key] = {};
  weightData[key][setNum] = val;
  const sub = ex.subExercises[subIdx];
  const isModified = val !== '' && parseFloat(val) !== (sub.targetWeight || 0);
  el?.classList.toggle('modified', isModified);
}
function toggleCardEdit(id) { editingCards[id] = !editingCards[id]; renderCards(); }
function toggleSkip(id)     { skipped[id]      = !skipped[id];      renderCards(); }
function moveEx(idx, dir) {
  const next = idx + dir;
  if (next < 0 || next >= exercises.length) return;
  [exercises[idx], exercises[next]] = [exercises[next], exercises[idx]];
  renderCards();
}
function deleteEx(idx) {
  if (!confirm(`"${exercises[idx].name}" 을(를) 삭제할까요?`)) return;
  delete editingCards[exercises[idx].id];
  exercises.splice(idx, 1);
  renderCards();
}

function confirmAdd() {
  const isSS = document.getElementById('ssToggle')?.checked;
  if (isSS) {
    const ssName = document.getElementById('ssName')?.value.trim() || '슈퍼세트';
    const ssSets = Number(document.getElementById('ssSets')?.value) || 3;
    const subExercises = [];
    for (let i = 0; i < ssSubCount; i++) {
      const name = document.getElementById('ssSubName' + i)?.value.trim();
      if (!name) { alert((SS_LABELS[i] || '') + ' 종목명을 입력해주세요'); return; }
      subExercises.push({
        name, variation: '',
        targetWeight: Number(document.getElementById('ssSubKg' + i)?.value) || 0,
        targetReps:   Number(document.getElementById('ssSubTarget' + i)?.value) || 10,
        lastRecord: null,
      });
    }
    exercises.push({ id: Date.now(), name: ssName, sets: ssSets, tag: null, isSuperset: true, subExercises });
  } else {
    const name = document.getElementById('newName')?.value.trim();
    if (!name) { alert('운동명을 입력해주세요'); return; }
    exercises.push({ id: Date.now(), name, sets: Number(document.getElementById('newSets')?.value)||3, targetWeight: Number(document.getElementById('newKg')?.value)||0, targetReps: Number(document.getElementById('newTarget')?.value)||10, tag: null, lastRecord: null, variation: '' });
    ['newName','newKg','newSets','newTarget'].forEach(id => { const el = document.getElementById(id); if(el) el.value = ''; });
  }
  const t = document.getElementById('ssToggle');
  if (t && t.checked) { t.checked = false; onSsToggle(); }
  showAddForm = false;
  document.getElementById('addForm').classList.remove('show');
  renderCards();
}

function formatRest(data) {
  if (!data) return '';
  const min = data.min ? parseInt(data.min) : 0;
  const sec = data.sec ? parseInt(data.sec) : 0;
  if (!min && !sec) return '';
  return `${min}:${String(sec).padStart(2, '0')}`;
}

/* ── Done Animation ────────────────────────────────────────── */
function triggerDoneAnimation(cardEl, callback) {
  cardEl.classList.add('card-glow');
  const rect   = cardEl.getBoundingClientRect();
  const cx     = rect.left + rect.width  / 2;
  const cy     = rect.top  + rect.height / 2;
  const colors = ['#FF8C42','#22C55E','#60A5FA','#F59E0B','#EC4899','#A78BFA','#fff'];
  for (let i = 0; i < 28; i++) {
    const el    = document.createElement('div');
    el.className = 'confetti-piece';
    const angle = Math.random() * Math.PI * 2;
    const dist  = 60 + Math.random() * 110;
    const dx    = Math.cos(angle) * dist;
    const dy    = Math.sin(angle) * dist - 80;
    const size  = 5 + Math.random() * 7;
    const dur   = 450 + Math.random() * 500;
    el.style.cssText = 'left:' + cx + 'px;top:' + cy + 'px;width:' + size + 'px;height:' + size + 'px;background:' + colors[Math.floor(Math.random() * colors.length)] + ';';
    document.body.appendChild(el);
    el.animate(
      [
        { transform: 'translate(-50%,-50%) rotate(0deg)', opacity: 1 },
        { transform: 'translate(calc(-50% + ' + dx + 'px),calc(-50% + ' + dy + 'px)) rotate(' + (Math.random()*720 - 360) + 'deg)', opacity: 0 }
      ],
      { duration: dur, easing: 'ease-out', fill: 'forwards' }
    ).onfinish = () => el.remove();
  }
  setTimeout(() => {
    cardEl.classList.remove('card-glow');
    if (callback) callback();
  }, 620);
}

/* ── Slide Complete Button ────────────────────────────────── */
function updateSlideBtn() {
  const wrap  = document.getElementById('slideWrap');
  const label = document.getElementById('slideLabel');
  if (!wrap) return;
  const allDone = exercises.length > 0 && exercises.every(ex => completedCards[ex.id] || skipped[ex.id]);
  wrap.classList.toggle('ready', allDone);
  if (label) label.textContent = allDone ? '밀어서 운동 완료 →' : '모든 운동을 완료해주세요';
}

function initSlideBtn() {
  const wrap   = document.getElementById('slideWrap');
  const handle = document.getElementById('slideHandle');
  if (!wrap || !handle) return;
  let startX = 0, offsetX = 0, dragging = false;
  const getMax = () => wrap.offsetWidth - handle.offsetWidth - 8;

  function dragStart(x) {
    if (!wrap.classList.contains('ready')) return;
    dragging = true;
    startX = x - offsetX;
  }
  function dragMove(x) {
    if (!dragging) return;
    const nx = Math.max(0, Math.min(x - startX, getMax()));
    offsetX = nx;
    handle.style.transform = 'translateX(' + nx + 'px)';
    if (nx >= getMax() * 0.85) {
      dragging = false; offsetX = 0;
      handle.style.transform = '';
      onComplete();
    }
  }
  function dragEnd() {
    if (!dragging) return;
    dragging = false; offsetX = 0;
    handle.style.transition = 'transform 0.2s';
    handle.style.transform = '';
    setTimeout(() => { handle.style.transition = ''; }, 220);
  }

  handle.addEventListener('touchstart', e => dragStart(e.touches[0].clientX), { passive: true });
  handle.addEventListener('touchmove',  e => { e.preventDefault(); dragMove(e.touches[0].clientX); }, { passive: false });
  handle.addEventListener('touchend', dragEnd);
  handle.addEventListener('mousedown', e => dragStart(e.clientX));
  document.addEventListener('mousemove', e => { if (dragging) dragMove(e.clientX); });
  document.addEventListener('mouseup', dragEnd);
}

/* ── Complete ──────────────────────────────────────────────── */
async function onComplete() {
  const results = exercises.map(ex => {
    if (ex.isSuperset) {
      return {
        name: ex.name, isSuperset: true, sets: ex.sets,
        memo:    skipped[ex.id] ? '(생략)' : (memoData[ex.id]?.trim()||''),
        rest:    skipped[ex.id] ? '' : formatRest(restData[ex.id]),
        skipped: !!skipped[ex.id],
        subResults: (ex.subExercises || []).map((sub, si) => ({
          name: sub.name, variation: sub.variation||'',
          weight: sub.targetWeight||0,
          targetReps: sub.targetReps||0,
          weights: Array.from({ length: ex.sets }, (_, s) => { const v = weightData[`${ex.id}_${si}`]?.[s+1]; return (v !== undefined && v !== '') ? parseFloat(v) : (sub.targetWeight||0); }),
          reps: Array.from({ length: ex.sets }, (_, s) => { const v = repsData[`${ex.id}_${si}`]?.[s+1]; return v ? parseInt(v) : 0; }),
        })),
      };
    }
    return {
      name: ex.name, variation: ex.variation||'', sets: ex.sets,
      weight: ex.targetWeight||0,
      targetReps: ex.targetReps||0,
      weights: Array.from({ length: ex.sets }, (_, s) => { const v = weightData[ex.id]?.[s+1]; return (v !== undefined && v !== '') ? parseFloat(v) : (ex.targetWeight||0); }),
      reps: Array.from({ length: ex.sets }, (_, s) => { const v = repsData[ex.id]?.[s+1]; return v ? parseInt(v) : 0; }),
      memo:    skipped[ex.id] ? '(생략)' : (memoData[ex.id]?.trim()||''),
      rest:    skipped[ex.id] ? '' : formatRest(restData[ex.id]),
      skipped: !!skipped[ex.id],
    };
  });
  const condition = document.getElementById('condition')?.value?.trim() || '';
  const completeArea = document.getElementById('completeArea');
  if (completeArea) completeArea.innerHTML = '<div style="text-align:center;padding:20px;color:var(--text2);font-size:14px;font-weight:700;">저장 중...</div>';
  try {
    await apiPost({ action: 'saveResult', data: { date: missionData.date, day: missionData.day, routineName: programName, results } });
    if (completeArea) completeArea.innerHTML = '<div style="text-align:center;padding:20px;color:var(--text2);font-size:14px;font-weight:700;">피드백 받는 중...</div>';
    const outroType = isFreeWorkout ? 'freeOutro' : 'outro';
    const outroPayload = isFreeWorkout
      ? { results, condition }
      : { mission: missionData, results, condition };
    const outro = await apiPost({ action: 'getCoaching', type: outroType, missionData: outroPayload });
    const outroEl = document.createElement('div');
    outroEl.className = 'outro-card';
    outroEl.innerHTML = `
      <div class="outro-label">🔥 오늘의 피드백</div>
      <div class="outro-text">${outro.text||'오늘도 수고했어! 💪'}</div>
      <button class="complete-btn" style="margin-top: 20px; background: linear-gradient(135deg, #22C55E, #15803D); color: #000;" onclick="renderLanding(); updateLandingStatus(); updateWeekAlert();">끝</button>
    `;
    completeArea.replaceWith(outroEl);
    outroEl.scrollIntoView({ behavior: 'smooth', block: 'start' });
  } catch(err) {
    if (completeArea) { completeArea.innerHTML = '<div class="slide-wrap ready" id="slideWrap"><div class="slide-handle" id="slideHandle">›</div><span class="slide-label" id="slideLabel">밀어서 운동 완료 →</span></div>'; initSlideBtn(); }
    alert('오류: ' + err.message);
  }
}

/* ── Render Main (Dashboard) ───────────────────────────────── */

  document.getElementById('app').innerHTML = `
    <div class="header">
      <div style="margin-bottom: 10px; display:flex; justify-content:space-between; align-items:center;">
        <button class="back-btn" onclick="renderLanding(); updateLandingStatus(); updateWeekAlert();">← 뒤로</button>
        <button class="routine-nav-btn" onclick="renderSearchHistory()">🔍</button>
      </div>
      <div style="margin-bottom: 10px;">
        <span class="logo" style="font-size:22px;letter-spacing:0.05em;text-transform:none;">🏋️핸니의 체육관🏋️</span>
      </div>
      <div style="display:flex;justify-content:flex-end;margin-bottom:14px;">
        <span id="programWrap"></span>
      </div>
      <div class="field-label">컨디션 및 특이사항</div>
      <textarea class="condition-input" id="condition" placeholder="예: 왼쪽 승모근 뭉침&#10;늦게 시작해서 시간 봐가며 진행"></textarea>
      <button class="intro-btn" id="introBtn" onclick="toggleIntroCard()" style="margin-top:12px;">${isFreeWorkout ? '💬 코치에게 말하기' : '💬 코치 메시지 보기'}</button>
      <div id="introCard" style="display:none;margin-top:10px">
        <div class="intro-card-inner">
          <div class="intro-card-label">💬 코치 메시지</div>
          <div class="intro-card-text" id="introCardText"><div class="popup-loading">코치 메시지 불러오는 중...</div></div>
        </div>
      </div>
    </div>
    <div id="cards"></div>
    <button class="add-ex-btn" onclick="toggleAddForm()">+ 운동 추가</button>
    <div class="add-form" id="addForm">
      <div class="add-form-title">새 운동 추가</div>
      <div id="normalFields">
        <div class="add-grid">
          <div class="add-field full">
            <label>운동명</label>
            <input id="newName" type="text" placeholder="예: 레그 컬">
            <button class="import-btn" onclick="openImportForNormal()">📂 기존 운동 가져오기</button>
          </div>
          <div class="add-field"><label>중량 (kg)</label><input id="newKg" type="number" placeholder="0" inputmode="numeric"></div>
          <div class="add-field"><label>세트 수</label><input id="newSets" type="number" placeholder="3" inputmode="numeric"></div>
          <div class="add-field"><label>목표 횟수</label><input id="newTarget" type="number" placeholder="10" inputmode="numeric"></div>
        </div>
      </div>
      <div class="add-ss-toggle-row">
        <span class="add-ss-toggle-label">⚡ 슈퍼세트로 만들기</span>
        <label class="toggle-wrap"><input type="checkbox" id="ssToggle" onchange="onSsToggle()"><span class="toggle-slider"></span></label>
      </div>
      <div id="ssFields" style="display:none">
        <div class="add-ss-body">
          <div class="add-ss-name-row">
            <div class="add-field full" style="margin-bottom:10px;"><label>슈퍼세트 이름</label><input id="ssName" type="text" placeholder="예: 상체 슈퍼세트"></div>
          </div>
          <div class="add-field" style="margin-bottom:12px;"><label>세트 수 (공유)</label><input id="ssSets" type="number" placeholder="3" inputmode="numeric"></div>
          <div id="ssSubList"></div>
          <button class="add-ss-add-btn" id="ssAddSubBtn" onclick="addSsSub()" style="display:none">+ 종목 추가</button>

  renderProgramBadge();

/* ── Search History ────────────────────────────────────────── */
async function renderSearchHistory() {
  searchDaySelected  = null;
  searchDates        = [];
  searchDateSelected = null;
  searchExSelected   = null;

  document.getElementById('app').innerHTML = `
    <div class="page-header" style="display:flex;justify-content:space-between;align-items:center;width:100%;">
      <div style="display:flex;align-items:center;gap:14px;">
        <button class="back-btn" onclick="renderLanding();updateLandingStatus();updateWeekAlert();">← 뒤로</button>
        <span class="page-title">기록 검색</span>
      </div>
      <span class="logo" style="font-size:16px;font-weight:900;letter-spacing:0.03em;text-transform:none;">🏋️핸니의 체육관🏋️</span>
    </div>
    <div style="display:flex;gap:8px;margin-bottom:16px;">
      <button class="search-tab-btn${searchTab==='day'?' active':''}" id="tab-day" onclick="switchSearchTab('day')">📅 요일별</button>
      <button class="search-tab-btn${searchTab==='exercise'?' active':''}" id="tab-exercise" onclick="switchSearchTab('exercise')">🏋️ 종목별</button>
    </div>
    <div id="search-body"></div>`;

  await renderSearchBody();
}

async function switchSearchTab(tab) {
  searchTab          = tab;
  searchDaySelected  = null;
  searchDates        = [];
  searchDateSelected = null;
  searchExSelected   = null;
  document.querySelectorAll('.search-tab-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('tab-' + tab)?.classList.add('active');
  await renderSearchBody();
}

async function renderSearchBody() {
  const body = document.getElementById('search-body');
  if (!body) return;
  if (searchTab === 'day') {
    renderSearchDayTab(body);
  } else {
    await loadSearchExerciseTab(body);
  }
}

/* ── 요일별 탭 ─────────────────────────────────────────────── */
function renderSearchDayTab(body) {
  const days = ['월', '화', '수', '목', '금', '토', '일'];
  let html = `<div style="display:flex;flex-wrap:wrap;gap:8px;margin-bottom:16px;">`;
  days.forEach(d => {
    html += `<button class="search-day-btn${searchDaySelected===d?' active':''}" onclick="onSelectDay('${d}')">${d}요일</button>`;
  });
  html += `</div><div id="search-day-result"></div>`;
  body.innerHTML = html;
  if (searchDaySelected) renderSearchDayResult();
}

async function onSelectDay(day) {
  searchDaySelected  = day;
  searchDateSelected = null;
  searchDates        = [];
  document.querySelectorAll('.search-day-btn').forEach(b => {
    b.classList.toggle('active', b.textContent === day + '요일');
  });
  const resultEl = document.getElementById('search-day-result');
  if (!resultEl) return;
  resultEl.innerHTML = '<div class="loading" style="height:auto;padding:24px 0;"><div class="spinner"></div></div>';
  try {
    const res = await apiGet({ action: 'searchHistory', subAction: 'getDayList', day });
    searchDates = res.dates || [];
    renderSearchDayResult();
  } catch(err) {
    resultEl.innerHTML = `<div class="error-card"><h3>오류</h3><p>${err.message}</p></div>`;
  }
}

function renderSearchDayResult() {
  const resultEl = document.getElementById('search-day-result');
  if (!resultEl) return;

  if (searchDates.length === 0) {
    resultEl.innerHTML = `<div style="text-align:center;padding:24px 0;color:var(--text2);font-size:14px;">${searchDaySelected}요일 운동 기록이 없어요</div>`;
    return;
  }

  const fmtKor = iso => {
    const d = new Date(iso + 'T00:00:00');
    return `${d.getMonth()+1}월 ${d.getDate()}일`;
  };

  let html = `<div class="search-section-label">${searchDaySelected}요일 기록</div>`;
  searchDates.forEach(date => {
    html += `<button class="search-date-item${searchDateSelected===date?' active':''}" onclick="onSelectDate('${date}')">${fmtKor(date)} <span style="color:var(--text3);font-size:12px;margin-left:6px;">${date}</span></button>`;
  });
  html += `<div id="search-date-result" style="margin-top:4px;"></div>`;
  resultEl.innerHTML = html;

  if (searchDateSelected) loadAndRenderDateResult(searchDateSelected);
}

async function onSelectDate(date) {
  searchDateSelected = date;
  document.querySelectorAll('.search-date-item').forEach(b => {
    b.classList.toggle('active', b.getAttribute('onclick')?.includes(`'${date}'`));
  });
  const resultEl = document.getElementById('search-date-result');
  if (!resultEl) { renderSearchDayResult(); return; }
  await loadAndRenderDateResult(date);
}

async function loadAndRenderDateResult(date) {
  const resultEl = document.getElementById('search-date-result');
  if (!resultEl) return;
  resultEl.innerHTML = '<div class="loading" style="height:auto;padding:20px 0;"><div class="spinner"></div></div>';
  try {
    const res = await apiGet({ action: 'searchHistory', subAction: 'getByDate', date });
    renderDateResult(resultEl, res);
  } catch(err) {
    resultEl.innerHTML = `<div class="error-card"><h3>오류</h3><p>${err.message}</p></div>`;
  }
}

function renderDateResult(el, res) {
  const exList = res.exercises || [];
  if (exList.length === 0) {
    el.innerHTML = `<div style="text-align:center;padding:24px 0;color:var(--text2);font-size:14px;">운동 기록이 없어요</div>`;
    return;
  }
  let html = '';
  exList.forEach(ex => {
    const weights = ex.weights ? String(ex.weights).split(',') : [];
    const reps    = ex.reps    ? String(ex.reps).split(',')    : [];
    const sets    = Math.max(weights.length, reps.length);
    let setsHTML  = '';
    for (let i = 0; i < sets; i++) {
      const w = weights[i]?.trim() || '-';
      const r = reps[i]?.trim()    || '-';
      setsHTML += `<div class="search-result-set">${i+1}세트 &nbsp;&nbsp; ${w}kg × ${r}회</div>`;
    }
    html += `
      <div class="search-result-card">
        <div class="search-result-name">${ex.name}${ex.variation ? ' <span style="color:var(--text2);font-size:13px;font-weight:600;">'+ex.variation+'</span>' : ''}</div>
        <div class="search-result-target">🎯 ${ex.targetWeight||'-'}kg × ${ex.targetReps||'-'}회 × ${ex.targetSets||'-'}세트</div>
        ${setsHTML}
        ${ex.memo ? `<div style="margin-top:8px;font-size:12px;color:var(--text2);">📝 ${ex.memo}</div>` : ''}
      </div>`;
  });
  el.innerHTML = html;
}

/* ── 종목별 탭 ─────────────────────────────────────────────── */
async function loadSearchExerciseTab(body) {
  body.innerHTML = '<div class="loading" style="height:auto;padding:24px 0;"><div class="spinner"></div><div class="loading-text" style="margin-top:12px;">최근 4주 종목 불러오는 중...</div></div>';
  try {
    const res = await apiGet({ action: 'searchHistory', subAction: 'getExerciseList' });
    renderSearchExerciseTab(body, res.exercises || []);
  } catch(err) {
    body.innerHTML = `<div class="error-card"><h3>오류</h3><p>${err.message}</p></div>`;
  }
}

function renderSearchExerciseTab(body, exList) {
  if (exList.length === 0) {
    body.innerHTML = `<div style="text-align:center;padding:24px 0;color:var(--text2);font-size:14px;">최근 4주 운동 기록이 없어요</div>`;
    return;
  }
  let html = `<div class="search-section-label">최근 4주 종목</div>`;
  html += `<div style="display:flex;flex-wrap:wrap;gap:8px;margin-bottom:16px;">`;
  exList.forEach(ex => {
    const safeName = ex.replace(/'/g, '&#39;');
    html += `<button class="search-ex-btn${searchExSelected===ex?' active':''}" data-name="${safeName}" onclick="onSelectExercise(this.dataset.name, this)">${ex}</button>`;
  });
  html += `</div><div id="search-ex-result"></div>`;
  body.innerHTML = html;
  if (searchExSelected) loadAndRenderExerciseResult(searchExSelected);
}

async function onSelectExercise(exerciseName, btn) {
  searchExSelected = exerciseName;
  document.querySelectorAll('.search-ex-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  const resultEl = document.getElementById('search-ex-result');
  if (!resultEl) return;
  resultEl.innerHTML = '<div class="loading" style="height:auto;padding:20px 0;"><div class="spinner"></div></div>';
  await loadAndRenderExerciseResult(exerciseName);
}

async function loadAndRenderExerciseResult(exerciseName) {
  const resultEl = document.getElementById('search-ex-result');
  if (!resultEl) return;
  try {
    const res = await apiGet({ action: 'searchHistory', subAction: 'getByExercise', exerciseName });
    renderExerciseResult(resultEl, res);
  } catch(err) {
    resultEl.innerHTML = `<div class="error-card"><h3>오류</h3><p>${err.message}</p></div>`;
  }
}

function renderExerciseResult(el, res) {
  const results = res.results || [];
  if (results.length === 0) {
    el.innerHTML = `<div style="text-align:center;padding:24px 0;color:var(--text2);font-size:14px;">최근 4주 기록이 없어요</div>`;
    return;
  }
  const fmtKor = iso => {
    const d = new Date(iso + 'T00:00:00');
    return `${d.getMonth()+1}월 ${d.getDate()}일`;
  };
  let html = `<div class="search-section-label">최근 4주 기록</div>`;
  results.forEach(r => {
    const weights = r.weights ? String(r.weights).split(',') : [];
    const reps    = r.reps    ? String(r.reps).split(',')    : [];
    const sets    = Math.max(weights.length, reps.length);
    let setsHTML  = '';
    for (let i = 0; i < sets; i++) {
      const w  = weights[i]?.trim() || '-';
      const rp = reps[i]?.trim()    || '-';
      setsHTML += `<div class="search-result-set">${i+1}세트 &nbsp;&nbsp; ${w}kg × ${rp}회</div>`;
    }
    html += `
      <div class="search-result-card">
        <div class="search-result-date">📅 ${fmtKor(r.date)} (${r.day})</div>
        <div class="search-result-target">🎯 ${r.targetWeight||'-'}kg × ${r.targetReps||'-'}회 × ${r.targetSets||'-'}세트</div>
        ${setsHTML}
        ${r.memo ? `<div style="margin-top:8px;font-size:12px;color:var(--text2);">📝 ${r.memo}</div>` : ''}
      </div>`;
  });
  el.innerHTML = html;
}

/* ── Init ──────────────────────────────────────────────────── */
renderLanding();
loadBackgroundData();
</script>
</body>
